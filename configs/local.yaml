mode: full
paths:
  assets: ../data/local/assets.csv
  market_bars: ../data/local/market_bars.parquet
  text_items: ../data/local/text_items.parquet
  raw_dir: ../data/raw
  interim_dir: ../data/interim/local
  processed_dir: ../data/processed/local
  models_dir: ../models/local
  reports_dir: ../reports/local
data:
  storage_format: parquet
  compression: zstd
  write_batch_rows: 10000
  calendar: XNYS
  schema_version: "1"
  market_license_or_terms_ref: user-provided-local
  text_license_or_terms_ref: user-provided-local
features:
  windows_days: [1, 3, 5, 20]
  market_warmup_sessions: 60
  text_warmup_days: 40
  event_lookahead_days: 30
  horizon_days: 1
  feature_set_version: local-v2
  label_version: local-v2
  model_version: local-walk-forward-v2
  text_decay_half_life_days: 1.0
  decision_time: close
models:
  families: [traditional, text, combined]
  min_train_rows: 252
  embargo_periods: 1
  top_k: 20
backtest:
  commission_bps: 1.0
  half_spread_bps: 5.0
  slippage_bps: 2.0
  volatility_slippage_multiplier: 0.08
  participation_slippage_bps: 75.0
  market_impact_multiplier: 0.15
  borrow_bps_per_year: 300.0
  max_position_weight: 0.05
  max_gross_exposure: 1.0
  max_net_exposure: 0.2
  max_sector_weight: 0.25
  max_beta_exposure: 0.15
  missing_beta_fallback: 1.0
  missing_volatility_floor: 0.03
  max_daily_turnover: 0.25
  same_day_exit_notional_buffer: 0.10
  max_participation_rate: 0.02
  min_price: 5.0
  min_dollar_volume: 5000000.0
  shorting_allowed: false
  hard_to_borrow_allowed: false
  initial_capital: 1000000.0
  rebalance_frequency: 1d
  benchmark: equal_weight
runtime:
  limit: null
  start_date: null
  end_date: null
  symbols: []
transformer:
  enabled: false
  model_name: null
  model_version: local-transformer-v1
  batch_size: 32
  max_sequence_length: 256
  local_files_only: true
