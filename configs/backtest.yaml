mode: sample
paths:
  assets: ../data/samples/assets.csv
  market_bars: ../data/samples/market_bars.csv
  text_items: ../data/samples/text_items.jsonl
  raw_dir: ../data/raw
  interim_dir: ../data/interim/backtest
  processed_dir: ../data/processed/backtest
  models_dir: ../models/backtest
  reports_dir: ../reports/backtest
  llm_model: null
data:
  storage_format: parquet
  compression: zstd
  write_batch_rows: 10000
  calendar: XNYS
  schema_version: "2"
  market_license_or_terms_ref: synthetic-fixture-v1
  text_license_or_terms_ref: synthetic-fixture-v1
features:
  windows_days: [1, 3, 5, 20]
  market_warmup_sessions: 60
  text_warmup_days: 40
  event_lookahead_days: 30
  horizon_days: 1
  feature_set_version: backtest-v3
  label_version: backtest-v2
  model_version: backtest-walk-forward-v3
  text_decay_half_life_days: 1.0
  decision_time: close
models:
  families: [traditional, text, combined]
  min_train_rows: 4
  embargo_periods: 1
  final_holdout_periods: 2
  top_k: 2
backtest:
  commission_bps: 1.0
  half_spread_bps: 3.0
  slippage_bps: 2.0
  volatility_slippage_multiplier: 0.08
  participation_slippage_bps: 75.0
  market_impact_multiplier: 0.15
  borrow_bps_per_year: 300.0
  max_position_weight: 0.35
  max_gross_exposure: 0.7
  max_net_exposure: 0.7
  max_sector_weight: 0.5
  max_beta_exposure: 1.0
  missing_beta_fallback: 1.0
  missing_volatility_floor: 0.03
  max_daily_turnover: 0.5
  same_day_exit_notional_buffer: 0.10
  max_participation_rate: 0.02
  min_price: 5.0
  min_dollar_volume: 1000000.0
  shorting_allowed: false
  hard_to_borrow_allowed: false
  initial_capital: 1000000.0
  rebalance_frequency: 1d
  benchmark: equal_weight
runtime:
  limit: null
  start_date: null
  end_date: null
  symbols: []
transformer:
  enabled: false
  model_name: null
  model_version: local-transformer-v1
  batch_size: 16
  max_sequence_length: 256
  local_files_only: true
llm_annotations:
  enabled: false
  apply_to_features: false
  backend: transformers_causal_lm
  model_id: null
  model_revision: null
  model_license_or_terms_ref: null
  prompt_version: entity-event-v1
  schema_version: entity-event-v1
  batch_size: 1
  max_input_tokens: 2048
  max_new_tokens: 384
  decoding: greedy
  seed: 7
  local_files_only: true
  trust_remote_code: false
